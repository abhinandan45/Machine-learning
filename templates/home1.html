<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>House Price Predictor</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            font-family: 'Roboto', sans-serif;
            background-color: #f7f9fc;
            text-align: center;
        }

        /* Navbar */
        .navbar {
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #1e3a8a;
            padding: 15px 0;
        }

        .navbar a {
            color: white;
            text-decoration: none;
            padding: 12px 25px;
            margin: 0 10px;
            border-radius: 6px;
            font-weight: bold;
            transition: background 0.3s ease;
        }

        .navbar a:hover {
            background-color: #3749c1;
        }

        h1 {
            margin-top: 30px;
            font-size: 2.5rem;
            color: #1e3a8a;
        }

        h1::before {
            content: "🏡 ";
        }

        .house-image {
            width: 600px;
            max-width: 90%;
            height: auto;
            border-radius: 12px;
            margin-top: 30px;
            box-shadow: 0px 4px 15px rgba(0, 0, 0, 0.2);
        }

        .content {
            padding: 30px;
        }
    </style>
</head>
<body>

    <!-- Navigation bar -->
    <div class="navbar">
        <a href="/">Home</a>
        <a href="/eda">EDA Analysis</a>
        <a href="/predict">Predict House Price</a>
    </div>

    <div class="content">
        <h1>House Price Predictor</h1>

        <img src="{{ url_for('static', filename='home_banner.jpg') }}" alt="House Image" class="house-image">
    </div>

</body>
</html>
