<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Predict House Price</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            font-family: 'Roboto', sans-serif;
            background-color: #f7f9fc;
            text-align: center;
        }

        .navbar {
            display: flex;
            justify-content: center;
            background-color: #1e3a8a;
            padding: 15px 0;
        }

        .navbar a {
            color: white;
            text-decoration: none;
            padding: 12px 25px;
            margin: 0 10px;
            border-radius: 6px;
            font-weight: bold;
            transition: background 0.3s ease;
        }

        .navbar a:hover {
            background-color: #3749c1;
        }

        form {
            margin-top: 40px;
        }

        input, select {
            padding: 10px;
            width: 300px;
            margin: 10px;
            font-size: 1rem;
        }

        button {
            padding: 10px 20px;
            background-color: #1e40af;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            cursor: pointer;
        }

        h2 {
            margin-top: 20px;
            color: #1e3a8a;
        }
    </style>
</head>
<body>

    <!-- Navigation Bar -->
    <div class="navbar">
        <a href="/">Home</a>
        <a href="/eda">EDA Analysis</a>
        <a href="/predict">Predict Price</a>
    </div>

    <!-- Form Heading -->
    <h2>Enter House Details</h2>

    <!-- Prediction Form -->
    <form method="POST">
        <input type="text" name="area" placeholder="Area (sq ft)" required><br>
        <input type="text" name="bathrooms" placeholder="Number of Bathrooms" required><br>
        <input type="text" name="stories" placeholder="Number of Stories" required><br>
        <input type="text" name="parking" placeholder="Parking Spaces" required><br>

        <label for="airconditioning">Air Conditioning:</label><br>
        <select name="airconditioning" required>
            <option value="1">Yes</option>
            <option value="0">No</option>
        </select><br>

        <!-- Furnishing status (used in model) -->
        <label for="furnishingstatus">Furnishing Status:</label><br>
        <select name="furnishingstatus" required>
            <option value="Furnished">Furnished</option>
            <option value="Semi-Furnished">Semi-Furnished</option>
            <option value="Unfurnished">Unfurnished</option>
        </select><br>

        <button type="submit">Predict</button>
    </form>

    <!-- Result -->
    {% if result is not none %}
        <h2>Predicted Price: ₹{{ result | round(2) }}</h2>
    {% endif %}

</body>
</html>
