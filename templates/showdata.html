<!DOCTYPE html>
<html>
<head>
    <title>Student Data</title>
</head>
<body>
    <h2>Students Data from MySQL</h2>

    <table border="1">
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>City</th>
        </tr>
        {% for row in data %}
        <tr>
            <td>{{ row.id }}</td>
            <td>{{ row.name }}</td>
            <td>{{ row.city }}</td>
        </tr>
        {% endfor %}
    </table>
</body>
</html>
